# Despliegue en Render: web (Next.js) + worker de ingesta.
# NOTA: los Background Workers de Render NO tienen free tier (servicio de pago).
# Rellena las variables marcadas como sync:false en el panel de Render.
services:
  - type: web
    name: jul-ia-web
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CHAT_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: REQUIRE_AUTH
        value: "true"

  - type: worker
    name: jul-ia-ingest
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install
    startCommand: npm run worker:ingest
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: INGEST_POLL_INTERVAL_MS
        value: "3000"
      - key: INGEST_MAX_ATTEMPTS
        value: "3"
      - key: INGEST_LOCK_TIMEOUT_SECONDS
        value: "300"
      - key: INGEST_MAX_CHUNK_CHARS
        value: "4000"
